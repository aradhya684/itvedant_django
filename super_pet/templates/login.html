{%extends 'base.html'%} {%block title%} login page {%endblock %} 

{% block content %}
<div class="container border border-dark m-5 p-4">
<h3>Login Here</h3>
<form>
  <div class="form-group mb-3">
    <label for="exampleInputEmail1">Username</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email" name="username"/>
    
  </div>
  <div class="form-group mb-3">
    <label for="exampleInputPassword1">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password" name="password"/>
  </div>
  <div class="form-group form-check mb-3">
    <input type="checkbox" class="form-check-input" id="exampleCheck1" />
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
  <button type="submit" class="btn btn-dark">Submit</button>
</form>
</div>
{% endblock %}
