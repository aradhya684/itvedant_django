{%extends 'base.html'%}


{%block title%}
register
{%endblock %}



{%block content%} 

<div class="container border border-dark m-5 p-4">
    <h3 class="bg-dark mb-3 text-white">Register Here</h3>
<form action="" method="post">
   {% csrf_token %}
 
   {% for i in form %}

<div class="mb-3">
    {{i.label_tag}}
    {{i}}

    {% if i.errors %}
    <div class="col-auto">
        <span id="passwordHelpInline" class="form-text text-danger">
          {{i.errors}}
        </span>
      </div>
      {% endif %}
    
    <div id="emailHelp" class="form-text">{{i.help_text}}</div>
</div>
    

    {% endfor %}
    <input type="submit" value="Register user">
</form>
</div>
{%endblock %}
